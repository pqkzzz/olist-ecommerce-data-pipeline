version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw Olist CSV tables loaded into PostgreSQL"
    tables:
      - name: customers
      - name: geolocation
      - name: order_items
      - name: order_payments
      - name: order_reviews
      - name: orders
      - name: products
      - name: sellers
      - name: product_category_translation

models:
  - name: stg_orders
    description: "Cleaned order data from raw Olist orders dataset"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - canceled
                - unavailable
                - invoiced
                - processing
                - created
                - approved

      - name: order_purchase_timestamp
        tests:
          - not_null

  - name: stg_order_items
    description: "Cleaned order item data"
    columns:
      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: freight_value
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customer data"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_products
    description: "Cleaned product data"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: product_category_name
        tests:
          - not_null

  - name: stg_sellers
    description: "Cleaned seller data"
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: stg_payments
    description: "Cleaned payment data"
    columns:
      - name: order_id
        tests:
          - not_null

      - name: payment_sequential
        tests:
          - not_null

      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values:
                - credit_card
                - boleto
                - voucher
                - debit_card
                - not_defined

      - name: payment_value
        tests:
          - not_null

  - name: stg_reviews
    description: "Cleaned review data"
    columns:
      - name: review_id
        tests:
          - not_null

      - name: order_id
        tests:
          - not_null

      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
              quote: false

  - name: dim_customers
    description: "Customer dimension table"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    description: "Product dimension table"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_sellers
    description: "Seller dimension table"
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: dim_dates
    description: "Date dimension table"
    columns:
      - name: date_id
        tests:
          - not_null
          - unique

  - name: fact_order_items
    description: "Fact table at order item grain"
    columns:
      - name: order_item_key
        tests:
          - not_null
          - unique

      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

      - name: order_item_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: seller_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_id

      - name: order_date_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_id

      - name: price
        tests:
          - not_null

      - name: freight_value
        tests:
          - not_null

      - name: total_order_item_value
        tests:
          - not_null

  - name: fact_payments
    description: "Payment fact table"
    columns:
      - name: payment_key
        tests:
          - not_null
          - unique

      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

      - name: payment_sequential
        tests:
          - not_null

      - name: payment_type
        tests:
          - not_null

      - name: payment_value
        tests:
          - not_null

  - name: fact_reviews
    description: "Review fact table"
    columns:
      - name: review_id
        tests:
          - not_null

      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

      - name: review_score
        tests:
          - not_null