version: 2

models:
  - name: stg_orders
    description: "Cleaned order data from raw Olist orders dataset"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null

  - name: stg_order_items
    description: "Cleaned order item data"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customer data"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_products
    description: "Cleaned product data"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_sellers
    description: "Cleaned seller data"
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: dim_customers
    description: "Customer dimension table"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    description: "Product dimension table"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_sellers
    description: "Seller dimension table"
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: dim_dates
    description: "Date dimension table"
    columns:
      - name: date_id
        tests:
          - not_null
          - unique

  - name: fact_order_items
    description: "Fact table at order item grain"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: total_order_item_value
        tests:
          - not_null

  - name: fact_payments
    description: "Payment fact table"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_value
        tests:
          - not_null

  - name: fact_reviews
    description: "Review fact table"
    columns:
      - name: review_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null